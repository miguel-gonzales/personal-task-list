# My api specification

openapi: 3.1.0
info:
  title: Taskminator API
  description: Lightweight task management API for developers.
  version: 1.0.0

paths:
  /tasks:
    get:
      tags:
        - Tasks
      summary: List all existing tasks
      responses:
        '200':
          description: A list of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
    post:
      tags:
        - Tasks
      summary: Create a new task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                id:
                  type: string
                  format: uuid
                  description: Optional client-generated UUID (offline capabilities)
                title:
                  type: string
                  maxLength: 280
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'

  /tasks/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      tags:
        - Tasks
      summary: Update task status or title
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                status:
                  $ref: '#/components/schemas/Status'
      responses:
        '200':
          description: Task updated
    delete:
      tags:
        - Tasks
      summary: Soft-delete a task
      responses:
        '204':
          description: Task marked as deleted
          
components:
  schemas:
    Status:
      type: string
      enum: [todo, done]
      default: todo
    Task:
      type: object
      required: [id, title, status, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        status:
          $ref: '#/components/schemas/Status'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true